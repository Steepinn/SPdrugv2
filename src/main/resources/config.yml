# SPdrug — edit and reload: /spdrug reload (needs spdrug.admin)
# Colors in strings: & prefix (e.g. &a green, &c red)

general:
  # UI language: en (default) | ru — full strings in jar lang/en.yml and lang/ru.yml; this file is fallback / overrides
  language: en
  # Радиус (блоки), на котором виден BossBar сушки/синтеза
  bossbar-show-radius-blocks: 2.5

# Блоки, которые ставятся установщиками (имена Bukkit; должны быть isBlock)
blocks:
  laboratory-placed: SMOKER
  farm-placed: COMPOSTER

# Предметы с метками плагина (имена Bukkit; должны быть предметами, не воздух)
# Если сменишь dried-batch — поправь recipe в drugs, чтобы 1-й материал совпадал (для экстракта)
item-materials:
  lab-placer: BLAZE_ROD
  farm-placer: GOLDEN_HOE
  growth-watch: CLOCK
  cigarette: PAPER
  herb-raw: DRIED_KELP
  dried-batch: NETHER_WART
  finished-drug: SUGAR

# Горизонтальный радиус от компостера: 2 = клетки с |dx|,|dz| ≤ 2 (квадрат 5×5 с центром)
# Вертикальный допуск по Y от уровня компостера
farm:
  horizontal-radius: 2
  vertical-range: 1
  drying-duration-ticks: 200
  # --- Рост папоротника с особых семян (на грядке) ---
  # Базовое время до созревания (сек); итоговое время = это значение ÷ множитель ниже
  field-herb-grow-duration-seconds: 60
  # Чем больше — тем быстрее. 2.0 ≈ в 2 раза быстрее; со светокамнем время ещё делится пополам (как раньше)
  field-herb-grow-speed-multiplier: 1.0
  # --- Пшеница в зоне теплицы (рядом с компостером): ускорение ванильных тиков роста, 1.0 = без бонуса
  greenhouse-wheat-grow-speed-multiplier: 1.0
  # --- Short/tall grass break: chance (0–100) to drop a special drug seed instead of vanilla wheat seeds
  grass-break-special-seed-chance-percent: 10.0
  # Веса типов при выпадении особого семени (любые >0, выбирается пропорционально сумме)
  grass-break-special-seed-weights:
    cannabis: 1.0
    cocaine: 1.0
    tobacco: 1.0

laboratory:
  synthesis-duration-ticks: 100
  explosion-power: 3.5
  explosion-damage-radius: 6.0
  explosion-damage-to-source: 6.0
  explosion-damage-to-others: 10.0

# Бесформенный крафт (любой порядок). Имена материалов Bukkit, например IRON_BLOCK
crafting:
  laboratory:
    ingredients:
    - IRON_BLOCK
    - GLASS
    - BLAZE_POWDER
    - CAULDRON
  farm:
    ingredients:
    - COMPOSTER
    - BONE_MEAL
    - IRON_HOE
  growth-watch:
    ingredients:
    - CLOCK
    - REDSTONE
    - GLASS_BOTTLE
  cigarette:
    ingredients:
    - PAPER

