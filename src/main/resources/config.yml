# === НАРКОТИКИ (drugs) ===
# === ХИМ-КОМПОНЕНТЫ (chemicals) ===
# Все компоненты делаются ТОЛЬКО через лабораторию пошагово.
# recipe: материалы Bukkit или CHEM:<id_компонента>
chemicals:
  h:
    symbol: H
    display-name: '&fHydrogen (H)'
    item-material: SNOWBALL
    recipe: [WATER_BUCKET, TORCH]
  na:
    symbol: Na
    display-name: '&fSodium (Na)'
    item-material: SNOWBALL
    recipe: [DANDELION, SUGAR_CANE, SUGAR_CANE, SUGAR_CANE, SUGAR_CANE]
  cl:
    symbol: Cl
    display-name: '&fChlorine (Cl)'
    item-material: SNOWBALL
    recipe: [KELP, GLASS_BOTTLE, TORCH]
  p:
    symbol: P
    display-name: '&fPhosphorus (P)'
    item-material: SNOWBALL
    recipe: [BONE_MEAL, REDSTONE]
  pa:
    symbol: PA
    display-name: '&bProlamine Acid (PA)'
    item-material: SNOWBALL
    recipe: [CHEM:h, CHEM:na]
  la:
    symbol: LA
    display-name: '&dLysergic Acid (LA)'
    item-material: SNOWBALL
    recipe: [CHEM:na, CHEM:cl]
  me:
    symbol: Me
    display-name: '&fMethyl Base (Me)'
    item-material: SNOWBALL
    recipe: [CHEM:h, SUGAR]
  am:
    symbol: Am
    display-name: '&fAmine Base (Am)'
    item-material: SNOWBALL
    recipe: [CHEM:p, CHEM:h]
  ec:
    symbol: Ec
    display-name: '&fEster Core (Ec)'
    item-material: SNOWBALL
    recipe: [CHEM:na, HONEY_BOTTLE]
  hc:
    symbol: Hc
    display-name: '&fHeavy Compound (Hc)'
    item-material: SNOWBALL
    recipe: [CHEM:cl, FERMENTED_SPIDER_EYE]

# У КАЖДОГО своё: кристалл — один предмет, тень — другой и т.д.
# Задаётся строкой Bukkit у своего ключа (meth, cocaine, …), например:
#   meth:
#     item-material: GLOWSTONE_DUST
#   cocaine:
#     item-material: SUGAR
# То же самое можно писать как material: или drug-material:
# Не указал — для этого id берётся общий item-materials.finished-drug
#
# Ключ — id препарата (/spdrug give drug <id>)
# recipe: порядок материалов в слотах лаборатории
# first-slot-must-be-dried-batch: true — 1-й предмет должен быть «сушёный сбор» (метка плагина)
# Эффекты: type — как в /effect (speed, regeneration…) или minecraft:speed
# duration-ticks ИЛИ duration-seconds; amplifier — уровень минус 1 (0 = I)
drugs:
  meth:
    display-name: '&dMephedrone'
    item-material: QUARTZ
    recipe: [REDSTONE, SUGAR, GLOWSTONE_DUST]
    recipe-keys: [CHEM:me, CHEM:am, CHEM:p]
    first-slot-must-be-dried-batch: false
    bad-trip-chance: 0.18
    positive-effects:
      nv:
        type: NIGHT_VISION
        amplifier: 0
        duration-seconds: 8
      glow:
        type: GLOWING
        amplifier: 0
        duration-seconds: 10
    negative-effects:
      a:
        type: WEAKNESS
        amplifier: 0
        duration-seconds: 10
      b:
        type: HUNGER
        amplifier: 0
        duration-seconds: 6

  lsd:
    display-name: '&eLSD'
    item-material: PAPER
    recipe: [SUGAR, WHEAT, REDSTONE]
    recipe-keys: [CHEM:pa, CHEM:la]
    first-slot-must-be-dried-batch: false
    bad-trip-chance: 0.22
    positive-effects:
      nv:
        type: NIGHT_VISION
        amplifier: 0
        duration-seconds: 16
      luck:
        type: LUCK
        amplifier: 0
        duration-seconds: 28
    negative-effects:
      a:
        type: NAUSEA
        amplifier: 0
        duration-seconds: 8
      b:
        type: SLOWNESS
        amplifier: 0
        duration-seconds: 8

  cocaine:
    display-name: '&5Cocaine'
    item-material: WHITE_DYE
    recipe: [NETHER_WART, SNOWBALL, SNOWBALL]
    recipe-keys: [MAT:NETHER_WART, CHEM:hc, CHEM:am]
    first-slot-must-be-dried-batch: true
    required-dried-type: cocaine
    bad-trip-chance: 0.25
    positive-effects:
      speed:
        type: SPEED
        amplifier: 0
        duration-seconds: 5
      nv:
        type: NIGHT_VISION
        amplifier: 0
        duration-seconds: 10
    negative-effects:
      a:
        type: WEAKNESS
        amplifier: 0
        duration-seconds: 12
      b:
        type: HUNGER
        amplifier: 0
        duration-seconds: 8

  cannabis:
    display-name: '&aCannabis'
    item-material: FERN
    recipe:
    - NETHER_WART
    - SUGAR
    - GLASS_BOTTLE
    first-slot-must-be-dried-batch: true
    bad-trip-chance: 0.2
    positive-effects:
      nv:
        type: NIGHT_VISION
        amplifier: 0
        duration-seconds: 10
      slowfall:
        type: SLOW_FALLING
        amplifier: 0
        duration-seconds: 6
    negative-effects:
      a:
        type: NAUSEA
        amplifier: 0
        duration-seconds: 6
      b:
        type: SLOWNESS
        amplifier: 0
        duration-seconds: 8

  mdma:
    display-name: '&bMDMA'
    item-material: AMETHYST_SHARD
    recipe: [QUARTZ, GLOWSTONE_DUST, SUGAR]
    recipe-keys: [CHEM:ec, CHEM:am, CHEM:na]
    first-slot-must-be-dried-batch: false
    bad-trip-chance: 0.16
    positive-effects:
      speed:
        type: SPEED
        amplifier: 0
        duration-seconds: 6
      luck:
        type: LUCK
        amplifier: 0
        duration-seconds: 26
    negative-effects:
      a:
        type: HUNGER
        amplifier: 0
        duration-seconds: 8
      b:
        type: NAUSEA
        amplifier: 0
        duration-seconds: 5

  heroin:
    display-name: '&8Heroin'
    item-material: TIPPED_ARROW
    recipe: [ENDER_PEARL, FERMENTED_SPIDER_EYE, REDSTONE]
    recipe-keys: [CHEM:hc, CHEM:pa]
    first-slot-must-be-dried-batch: false
    bad-trip-chance: 0.3
    positive-effects:
      regen:
        type: REGENERATION
        amplifier: 0
        duration-seconds: 5
      slowfall:
        type: SLOW_FALLING
        amplifier: 0
        duration-seconds: 12
    negative-effects:
      a:
        type: DARKNESS
        amplifier: 0
        duration-seconds: 10
      b:
        type: WEAKNESS
        amplifier: 0
        duration-seconds: 12

  amphetamine:
    display-name: '&6Amphetamine'
    item-material: LIGHT_GRAY_DYE
    recipe: [BLAZE_POWDER, HONEY_BOTTLE, REDSTONE]
    recipe-keys: [CHEM:me, CHEM:ec]
    first-slot-must-be-dried-batch: false
    bad-trip-chance: 0.21
    positive-effects:
      haste:
        type: HASTE
        amplifier: 0
        duration-seconds: 8
      nv:
        type: NIGHT_VISION
