        duration-seconds: 10
    negative-effects:
      a:
        type: SLOWNESS
        amplifier: 0
        duration-seconds: 8
      b:
        type: HUNGER
        amplifier: 0
        duration-seconds: 8

  nicotine:
    display-name: '&6Tobacco product'
    item-material: BROWN_DYE
    recipe: [NETHER_WART, PAPER]
    recipe-keys: [MAT:NETHER_WART, CHEM:me]
    first-slot-must-be-dried-batch: true
    required-dried-type: tobacco
    bad-trip-chance: 0.05
    positive-effects:
      nv:
        type: NIGHT_VISION
        amplifier: 0
        duration-seconds: 4
    negative-effects:
      a:
        type: HUNGER
        amplifier: 0
        duration-seconds: 6
